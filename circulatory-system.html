<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Circulatory System Visualization</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="audio-player.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }
    canvas {
      display: block;
    }
    #controls {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.9);
      padding: 20px;
      border-radius: 8px;
      z-index: 1000;
      border: 2px solid #2ea1ff;
      color: white;
      min-width: 250px;
    }
    #controls h3 {
      margin: 0 0 15px 0;
      color: #2ea1ff;
      text-align: center;
    }
    button {
      display: block;
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      background: #2ea1ff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
      transition: all 0.3s ease;
    }
    button:hover:not(:disabled) {
      background: #1e88d4;
      transform: scale(1.02);
    }
    button:disabled {
      background: #666;
      cursor: not-allowed;
      opacity: 0.5;
    }
    #status {
      margin-top: 15px;
      padding: 12px;
      background: rgba(46, 161, 255, 0.1);
      border: 1px solid rgba(46, 161, 255, 0.3);
      border-radius: 4px;
      font-size: 12px;
      line-height: 1.6;
    }
    #stateDisplay {
      color: #4dd3a2;
      font-weight: bold;
    }
    #infoDisplay {
      color: #90caf9;
    }
    .back-button {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(74, 85, 104, 0.8);
      padding: 10px 20px;
      border-radius: 6px;
      text-decoration: none;
      color: white;
      font-size: 14px;
      z-index: 1000;
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .back-button:hover {
      background: rgba(74, 85, 104, 1);
      border-color: rgba(46, 161, 255, 0.5);
    }
  </style>
</head>
<body>
  <a href="index.html" class="back-button">← Back to Home</a>
  <div id="controls">
    <h3>🫀 3D Circulatory System</h3>
    <button id="baselineBtn" onclick="setBaselineState()">1. Show Baseline (No Meds)</button>
    <button id="adminBtn" onclick="adminAmlodipine()">2. Administer Amlodipine</button>
    <button id="missedBtn" onclick="triggerMissedDoseWarning()">3. Simulate Missed Dose</button>
    <button id="resetBtn" onclick="resetSimulation()">Reset</button>
    <a href="amlodipine-simulation.html" class="back-button" style="position: static; display: block; margin-top: 10px; text-align: center;">Open Full Amlodipine Simulation</a>
    <div id="status">
      <strong>State:</strong> <span id="stateDisplay">Ready</span><br>
      <strong>Info:</strong> <span id="infoDisplay">Click buttons to start</span>
    </div>
  </div>
  <script>
    // Scene setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2a); // Lighter background
    scene.fog = new THREE.Fog(0x1a1a2a, 15, 50); // Adjusted fog

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 5); // Closer camera position
    camera.lookAt(0, 0, 0); // Explicitly look at origin

    // State machine
    let currentState = 'IDLE';
    let heart = null;
    let arteryMeshes = [];
    let flowSettings = { speed: 2.0, turbulent: true };
    const clock = new THREE.Clock();

    // Configuration objects
    const baselineConfig = {
      flowSpeed: 4.0,
      heatmapOpacity: 0.9,
      heartPulseRate: 2.5,
      heartPulseScale: 1.08,
      palette: { artery: 0xff3b3b, vein: 0xff7a00, heart: 0xff3b3b, bg: 0x2a1a1a }
    };

    const medicatedConfig = {
      flowSpeed: 1.0,
      heatmapOpacity: 0.3,
      heartPulseRate: 0.8,
      heartPulseScale: 1.02,
      palette: { artery: 0x2ea1ff, vein: 0x2fe8c5, heart: 0x54c7ff, bg: 0x1a2a3a }
    };

    // UI update function
    function updateUI(state, info) {
      currentState = state;
      document.getElementById('stateDisplay').textContent = state;
      document.getElementById('infoDisplay').textContent = info;
    }

    function disableButtons() {
      document.getElementById('baselineBtn').disabled = true;
      document.getElementById('adminBtn').disabled = true;
      document.getElementById('missedBtn').disabled = true;
    }

    function enableButtons() {
      document.getElementById('baselineBtn').disabled = false;
      document.getElementById('adminBtn').disabled = false;
      document.getElementById('missedBtn').disabled = false;
    }

    // Collect all artery meshes from circulatory system
    function collectArteryMeshes() {
      circulatorySystem.traverse((child) => {
        if (child.isMesh && child.material.color && child.material.color.getHex() > 0xff0000) {
          arteryMeshes.push({
            mesh: child,
            originalRadius: 0.07,
            originalColor: 0xff3333
          });
        }
      });
    }

    function setBaselineState() {
      updateUI('BASELINE_UNMEDICATED', 'Constricted arteries, turbulent flow, elevated heart rate');
      disableButtons();

      gsap.to(flowSettings, {
        duration: 2,
        speed: baselineConfig.flowSpeed,
        ease: 'power2.out'
      });

      gsap.to(heart.userData, {
        duration: 2,
        pulseRate: baselineConfig.heartPulseRate,
        pulseScale: baselineConfig.heartPulseScale,
        onComplete: enableButtons
      });

      gsap.to(scene, {
        duration: 2,
        onUpdate() {
          scene.background.setHex(baselineConfig.palette.bg);
          bloodFlowParticles.children.forEach((p) => {
            const startColor = new THREE.Color(0xff4d4d);
            const endColor = new THREE.Color(0xff9a4d);
            p.material.color.lerpColors(startColor, endColor, 0.5);
          });
        }
      });
    }

    function adminAmlodipine() {
      if (window.audioPlayer) window.audioPlayer.playSuccess();
      updateUI('DRUG_ADMINISTRATION', 'Amlodipine entering bloodstream, targeting calcium channels...');
      disableButtons();

      gsap.to(flowSettings, {
        duration: 3,
        speed: medicatedConfig.flowSpeed,
        ease: 'power2.inOut',
        delay: 1.5
      });

      gsap.to(heart.userData, {
        duration: 3,
        pulseRate: medicatedConfig.heartPulseRate,
        pulseScale: medicatedConfig.heartPulseScale,
        delay: 1.5
      });

      gsap.to(scene, {
        duration: 3,
        delay: 1.5,
        onUpdate() {
          const progress = gsap.getProperty(scene, 'progress') || 0.5;
          const bgColor = new THREE.Color();
          bgColor.lerpColors(
            new THREE.Color(baselineConfig.palette.bg),
            new THREE.Color(medicatedConfig.palette.bg),
            progress
          );
          scene.background.copy(bgColor);

          bloodFlowParticles.children.forEach((p) => {
            p.material.color.lerpColors(
              new THREE.Color(0xff9a4d),
              new THREE.Color(0x4dd3a2),
              progress
            );
            p.material.opacity = 0.8 - (progress * 0.4);
          });
        },
        onComplete() {
          updateUI('MEDICATED', 'Vasodilation achieved, laminar flow restored, normal heart rate');
          scene.background.setHex(medicatedConfig.palette.bg);
          enableButtons();
        }
      });
    }

    function triggerMissedDoseWarning() {
      if (window.audioPlayer) window.audioPlayer.playWarning();
      updateUI('MISSED_DOSE_WARNING', 'WARNING: Arteries re-constricting due to missed dose!');
      disableButtons();

      gsap.to(flowSettings, {
        duration: 4,
        speed: baselineConfig.flowSpeed,
        ease: 'power2.in'
      });

      gsap.to(heart.userData, {
        duration: 4,
        pulseRate: baselineConfig.heartPulseRate,
        pulseScale: baselineConfig.heartPulseScale
      });

      gsap.to(scene, {
        duration: 4,
        onUpdate() {
          const progress = gsap.getProperty(scene, 'progress') || 0.5;
          const bgColor = new THREE.Color();
          bgColor.lerpColors(
            new THREE.Color(medicatedConfig.palette.bg),
            new THREE.Color(baselineConfig.palette.bg),
            progress
          );
          scene.background.copy(bgColor);

          bloodFlowParticles.children.forEach((p) => {
            p.material.color.lerpColors(
              new THREE.Color(0x4dd3a2),
              new THREE.Color(0xff9a4d),
              progress
            );
          });
        },
        onComplete() {
          updateUI('BASELINE_UNMEDICATED', 'Back to baseline - Daily adherence is critical!');
          scene.background.setHex(baselineConfig.palette.bg);
          enableButtons();
        }
      });
    }

    function resetSimulation() {
      currentState = 'IDLE';
      gsap.killAll();
      updateUI('IDLE', 'Simulation reset. Click "Show Baseline" to start');
      scene.background.setHex(0x1a1a2a);
      flowSettings.speed = 2.0;
      enableButtons();
    }

    // Renderer setup
    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      alpha: true,
      powerPreference: "high-performance"
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // Cinematic lighting setup
    const ambientLight = new THREE.AmbientLight(0x1a1a2e, 0.3);
    scene.add(ambientLight);

    // Key light
    const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
    keyLight.position.set(5, 5, 5);
    keyLight.castShadow = true;
    keyLight.shadow.mapSize.width = 2048;
    keyLight.shadow.mapSize.height = 2048;
    keyLight.shadow.camera.near = 0.5;
    keyLight.shadow.camera.far = 50;
    keyLight.shadow.camera.left = -10;
    keyLight.shadow.camera.right = 10;
    keyLight.shadow.camera.top = 10;
    keyLight.shadow.camera.bottom = -10;
    scene.add(keyLight);

    // Fill light
    const fillLight = new THREE.DirectionalLight(0x4a90e2, 0.4);
    fillLight.position.set(-3, 2, -3);
    scene.add(fillLight);

    // Rim light
    const rimLight = new THREE.DirectionalLight(0xff6b6b, 0.6);
    rimLight.position.set(0, -5, -5);
    scene.add(rimLight);

    // Detailed anatomical heart model
    function createAnatomicalHeart() {
      const heartGroup = new THREE.Group();

      // Main ventricles (left and right)
      const ventricleGeometry = new THREE.SphereGeometry(0.8, 32, 16);
      ventricleGeometry.scale(1, 1.2, 0.8); // Elongated shape

      const leftVentricleMaterial = new THREE.MeshLambertMaterial({
        color: 0xff6b6b,
        transparent: true,
        opacity: 0.9,
        emissive: 0x330000
      });

      const rightVentricleMaterial = new THREE.MeshLambertMaterial({
        color: 0xff4444,
        transparent: true,
        opacity: 0.9,
        emissive: 0x220000
      });

      const leftVentricle = new THREE.Mesh(ventricleGeometry, leftVentricleMaterial);
      leftVentricle.position.set(-0.3, 0, 0);
      heartGroup.add(leftVentricle);

      const rightVentricle = new THREE.Mesh(ventricleGeometry, rightVentricleMaterial);
      rightVentricle.position.set(0.3, 0, 0);
      heartGroup.add(rightVentricle);

      const septumMaterial = new THREE.MeshLambertMaterial({
        color: 0x801a1a,
        transparent: true,
        opacity: 0.55,
        emissive: 0x220000
      });
      const septum = new THREE.Mesh(new THREE.BoxGeometry(0.08, 1.5, 0.8), septumMaterial);
      septum.position.set(0.0, 0, 0);
      heartGroup.add(septum);

      // Atria
      const atriumGeometry = new THREE.SphereGeometry(0.6, 24, 12);
      atriumGeometry.scale(1.2, 0.8, 1);

      const leftAtrium = new THREE.Mesh(atriumGeometry, leftVentricleMaterial);
      leftAtrium.position.set(-0.4, 0.8, 0);
      heartGroup.add(leftAtrium);

      const rightAtrium = new THREE.Mesh(atriumGeometry, rightVentricleMaterial);
      rightAtrium.position.set(0.4, 0.8, 0);
      heartGroup.add(rightAtrium);

      // Aorta (major artery)
      const aortaGeometry = new THREE.CylinderGeometry(0.15, 0.2, 2, 16);
      const aortaMaterial = new THREE.MeshLambertMaterial({
        color: 0xff0000,
        transparent: true,
        opacity: 0.8,
        emissive: 0x440000
      });

      const aorta = new THREE.Mesh(aortaGeometry, aortaMaterial);
      aorta.position.set(0, 1.5, 0);
      aorta.rotation.z = Math.PI / 6;
      heartGroup.add(aorta);

      // Superior vena cava (major vein)
      const svcGeometry = new THREE.CylinderGeometry(0.12, 0.18, 1.5, 12);
      const veinMaterial = new THREE.MeshLambertMaterial({
        color: 0x0066ff,
        transparent: true,
        opacity: 0.8,
        emissive: 0x001133
      });

      const svc = new THREE.Mesh(svcGeometry, veinMaterial);
      svc.position.set(0.6, 1.2, 0);
      svc.rotation.z = -Math.PI / 4;
      heartGroup.add(svc);

      // Pulmonary arteries and veins
      const pulmonaryArteryGeometry = new THREE.CylinderGeometry(0.1, 0.15, 1, 12);
      const pulmonaryArteryMaterial = new THREE.MeshLambertMaterial({
        color: 0xff3333,
        transparent: true,
        opacity: 0.8,
        emissive: 0x330000
      });

      const pulmonaryVeinMaterial = new THREE.MeshLambertMaterial({
        color: 0x3333ff,
        transparent: true,
        opacity: 0.8,
        emissive: 0x000033
      });

      // Pulmonary arteries (from heart to lungs)
      const leftPA = new THREE.Mesh(pulmonaryArteryGeometry, pulmonaryArteryMaterial);
      leftPA.position.set(-0.8, 0.5, 0.5);
      leftPA.rotation.set(0, 0, Math.PI / 3);
      heartGroup.add(leftPA);

      const rightPA = new THREE.Mesh(pulmonaryArteryGeometry, pulmonaryArteryMaterial);
      rightPA.position.set(0.8, 0.5, 0.5);
      rightPA.rotation.set(0, 0, -Math.PI / 3);
      heartGroup.add(rightPA);

      // Pulmonary veins (from lungs to heart)
      const leftPV = new THREE.Mesh(pulmonaryArteryGeometry, pulmonaryVeinMaterial);
      leftPV.position.set(-0.6, 0.8, -0.3);
      leftPV.rotation.set(0, 0, Math.PI / 4);
      heartGroup.add(leftPV);

      const rightPV = new THREE.Mesh(pulmonaryArteryGeometry, pulmonaryVeinMaterial);
      rightPV.position.set(0.6, 0.8, -0.3);
      rightPV.rotation.set(0, 0, -Math.PI / 4);
      heartGroup.add(rightPV);

      const pulmonaryTrunk = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.14, 1.2, 14), pulmonaryArteryMaterial);
      pulmonaryTrunk.position.set(0, 0.35, 0.15);
      pulmonaryTrunk.rotation.x = Math.PI / 6;
      heartGroup.add(pulmonaryTrunk);

      heartGroup.position.set(0, 0, 0);
      return heartGroup;
    }

    // Create the anatomical heart
    const anatomicalHeart = createAnatomicalHeart();
    scene.add(anatomicalHeart);

    // Initialize heart and flow state
    heart = anatomicalHeart;
    heart.userData = {
      pulseRate: 2.0,
      pulseScale: 1.02
    };

    // Create the detailed circulatory system
    const circulatorySystem = createDetailedCirculatorySystem();
    scene.add(circulatorySystem);

    function createLabelSprite(text, color = '#ffffff') {
      const canvas = document.createElement('canvas');
      const size = 256;
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, size, size);
      ctx.font = 'bold 28px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = color;
      ctx.strokeStyle = 'rgba(0,0,0,0.8)';
      ctx.lineWidth = 5;
      ctx.strokeText(text, size / 2, size / 2);
      ctx.fillText(text, size / 2, size / 2);
      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;
      const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
      const sprite = new THREE.Sprite(material);
      sprite.scale.set(1.6, 0.6, 1);
      return sprite;
    }

    function createLeaderLine(start, end) {
      const geometry = new THREE.BufferGeometry().setFromPoints([start, end]);
      const material = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.7 });
      return new THREE.Line(geometry, material);
    }

    // Create bioluminescent blood flow particles
    function createBloodFlowParticles() {
      const particleCount = 200;
      const particles = new THREE.Group();

      for (let i = 0; i < particleCount; i++) {
        const particleGeometry = new THREE.SphereGeometry(0.02, 8, 6);
        const particleMaterial = new THREE.MeshBasicMaterial({
          color: i % 2 === 0 ? 0xff3366 : 0x3366ff,
          transparent: true,
          opacity: 0.8
        });

        const particle = new THREE.Mesh(particleGeometry, particleMaterial);
        particle.position.set(
          (Math.random() - 0.5) * 6,
          (Math.random() - 0.5) * 8,
          (Math.random() - 0.5) * 2
        );
        particle.userData.speed = Math.random() * 0.02 + 0.01;
        particle.userData.phase = Math.random() * Math.PI * 2;

        particles.add(particle);
      }

      return particles;
    }

    const bloodFlowParticles = createBloodFlowParticles();
    scene.add(bloodFlowParticles);

    // Create detailed circulatory system with complete vascular loop
    function createDetailedCirculatorySystem() {
      const systemGroup = new THREE.Group();

      const arteryMaterial = new THREE.MeshLambertMaterial({
        color: 0xff3333,
        transparent: true,
        opacity: 0.88,
        emissive: 0x660000
      });

      const veinMaterial = new THREE.MeshLambertMaterial({
        color: 0x3377ff,
        transparent: true,
        opacity: 0.88,
        emissive: 0x002244
      });

      function buildVessel(points, radius, material) {
        const curve = new THREE.CatmullRomCurve3(points);
        const geometry = new THREE.TubeGeometry(curve, 80, radius, 12, false);
        return new THREE.Mesh(geometry, material);
      }

      // Aortic arch
      const archPoints = [
        new THREE.Vector3(-0.8, 1.1, 0),
        new THREE.Vector3(-0.4, 1.9, 0),
        new THREE.Vector3(0.2, 2.1, 0),
        new THREE.Vector3(0.8, 1.8, 0),
        new THREE.Vector3(1.2, 1.2, 0)
      ];
      systemGroup.add(buildVessel(archPoints, 0.15, arteryMaterial));

      // Left carotid artery
      const leftCarotidPoints = [
        new THREE.Vector3(-0.5, 1.4, 0),
        new THREE.Vector3(-0.9, 2.3, 0),
        new THREE.Vector3(-1.1, 3.0, 0)
      ];
      systemGroup.add(buildVessel(leftCarotidPoints, 0.08, arteryMaterial));

      // Right carotid artery
      const rightCarotidPoints = [
        new THREE.Vector3(0.9, 1.4, 0),
        new THREE.Vector3(1.3, 2.3, 0),
        new THREE.Vector3(1.5, 3.0, 0)
      ];
      systemGroup.add(buildVessel(rightCarotidPoints, 0.08, arteryMaterial));

      // Left subclavian artery
      const leftSubclavianPoints = [
        new THREE.Vector3(-0.4, 1.2, 0),
        new THREE.Vector3(-1.4, 1.9, 0),
        new THREE.Vector3(-2.0, 1.9, 0)
      ];
      systemGroup.add(buildVessel(leftSubclavianPoints, 0.1, arteryMaterial));

      // Right subclavian artery
      const rightSubclavianPoints = [
        new THREE.Vector3(0.8, 1.2, 0),
        new THREE.Vector3(1.8, 1.9, 0),
        new THREE.Vector3(2.2, 1.9, 0)
      ];
      systemGroup.add(buildVessel(rightSubclavianPoints, 0.1, arteryMaterial));

      // Descending and abdominal aorta
      const descendingPoints = [
        new THREE.Vector3(0.0, 1.0, 0),
        new THREE.Vector3(0.0, -0.5, 0),
        new THREE.Vector3(0.0, -2.3, 0),
        new THREE.Vector3(0.0, -3.5, 0)
      ];
      systemGroup.add(buildVessel(descendingPoints, 0.14, arteryMaterial));

      // Hepatic artery branch
      const hepaticPoints = [
        new THREE.Vector3(0.0, -1.6, 0),
        new THREE.Vector3(-0.7, -1.9, 0.4),
        new THREE.Vector3(-1.1, -2.1, 0.3)
      ];
      systemGroup.add(buildVessel(hepaticPoints, 0.07, arteryMaterial));

      // Renal arteries
      const leftRenalPoints = [
        new THREE.Vector3(-0.1, -1.8, 0),
        new THREE.Vector3(-0.7, -2.5, 0.2)
      ];
      systemGroup.add(buildVessel(leftRenalPoints, 0.07, arteryMaterial));

      const rightRenalPoints = [
        new THREE.Vector3(0.1, -1.8, 0),
        new THREE.Vector3(0.7, -2.5, 0.2)
      ];
      systemGroup.add(buildVessel(rightRenalPoints, 0.07, arteryMaterial));

      // Iliac arteries
      const leftIliacPoints = [
        new THREE.Vector3(0.0, -3.0, 0),
        new THREE.Vector3(-0.6, -4.2, 0)
      ];
      systemGroup.add(buildVessel(leftIliacPoints, 0.08, arteryMaterial));

      const rightIliacPoints = [
        new THREE.Vector3(0.0, -3.0, 0),
        new THREE.Vector3(0.6, -4.2, 0)
      ];
      systemGroup.add(buildVessel(rightIliacPoints, 0.08, arteryMaterial));

      // Superior vena cava
      const svcPoints = [
        new THREE.Vector3(1.2, 3.0, 0),
        new THREE.Vector3(0.6, 1.4, 0)
      ];
      systemGroup.add(buildVessel(svcPoints, 0.12, veinMaterial));

      // Inferior vena cava
      const ivcPoints = [
        new THREE.Vector3(0.2, -3.0, 0),
        new THREE.Vector3(0.2, -1.2, 0),
        new THREE.Vector3(0.2, 0.2, 0)
      ];
      systemGroup.add(buildVessel(ivcPoints, 0.12, veinMaterial));

      // Jugular veins
      const leftJugularPoints = [
        new THREE.Vector3(-1.1, 3.0, 0),
        new THREE.Vector3(-0.6, 1.5, 0.05)
      ];
      systemGroup.add(buildVessel(leftJugularPoints, 0.07, veinMaterial));

      const rightJugularPoints = [
        new THREE.Vector3(1.5, 3.0, 0),
        new THREE.Vector3(0.9, 1.5, 0.05)
      ];
      systemGroup.add(buildVessel(rightJugularPoints, 0.07, veinMaterial));

      // Subclavian veins
      const leftSubclavianVeinPoints = [
        new THREE.Vector3(-2.0, 1.9, 0),
        new THREE.Vector3(-1.0, 1.4, 0)
      ];
      systemGroup.add(buildVessel(leftSubclavianVeinPoints, 0.06, veinMaterial));

      const rightSubclavianVeinPoints = [
        new THREE.Vector3(2.2, 1.9, 0),
        new THREE.Vector3(1.0, 1.4, 0)
      ];
      systemGroup.add(buildVessel(rightSubclavianVeinPoints, 0.06, veinMaterial));

      // Renal veins
      const leftRenalVeinPoints = [
        new THREE.Vector3(-0.7, -2.6, 0.2),
        new THREE.Vector3(-0.2, -1.2, 0.1)
      ];
      systemGroup.add(buildVessel(leftRenalVeinPoints, 0.06, veinMaterial));

      const rightRenalVeinPoints = [
        new THREE.Vector3(0.7, -2.6, 0.2),
        new THREE.Vector3(0.2, -1.2, 0.1)
      ];
      systemGroup.add(buildVessel(rightRenalVeinPoints, 0.06, veinMaterial));

      // Hepatic vein
      const hepaticVeinPoints = [
        new THREE.Vector3(-1.0, -2.0, 0.3),
        new THREE.Vector3(-0.3, -1.0, 0.1)
      ];
      systemGroup.add(buildVessel(hepaticVeinPoints, 0.06, veinMaterial));

      // Pulmonary arteries and veins
      const leftPulmonaryArtery = buildVessel([
        new THREE.Vector3(-0.2, 0.5, 0.1),
        new THREE.Vector3(-0.8, 1.2, 0.8),
        new THREE.Vector3(-1.2, 1.8, 1.0)
      ], 0.09, arteryMaterial);
      const rightPulmonaryArtery = buildVessel([
        new THREE.Vector3(0.2, 0.5, 0.1),
        new THREE.Vector3(0.8, 1.2, 0.8),
        new THREE.Vector3(1.2, 1.8, 1.0)
      ], 0.09, arteryMaterial);
      systemGroup.add(leftPulmonaryArtery);
      systemGroup.add(rightPulmonaryArtery);

      const leftPulmonaryVein = buildVessel([
        new THREE.Vector3(-1.2, 1.8, -1.0),
        new THREE.Vector3(-0.8, 1.1, -0.5),
        new THREE.Vector3(-0.2, 0.7, 0)
      ], 0.08, veinMaterial);
      const rightPulmonaryVein = buildVessel([
        new THREE.Vector3(1.2, 1.8, -1.0),
        new THREE.Vector3(0.8, 1.1, -0.5),
        new THREE.Vector3(0.2, 0.7, 0)
      ], 0.08, veinMaterial);
      systemGroup.add(leftPulmonaryVein);
      systemGroup.add(rightPulmonaryVein);

      return systemGroup;
    }

    function addHeartLabels(heartGroup) {
      const heartLabels = [
        { point: new THREE.Vector3(0, 1.5, 0), label: new THREE.Vector3(1.8, 2.2, 0), text: 'Aorta' },
        { point: new THREE.Vector3(0.6, 1.2, 0), label: new THREE.Vector3(2.1, 1.9, 0), text: 'Superior Vena Cava' },
        { point: new THREE.Vector3(-0.8, 0.8, 0.5), label: new THREE.Vector3(-2.0, 1.8, 0), text: 'Pulmonary Artery' },
        { point: new THREE.Vector3(-0.2, 0.7, 0), label: new THREE.Vector3(-1.85, 1.5, 0), text: 'Pulmonary Vein', color: '#66ccff' },
        { point: new THREE.Vector3(-0.4, 0.8, 0), label: new THREE.Vector3(-2.0, 0.4, 0), text: 'Left Atrium' },
        { point: new THREE.Vector3(0.4, 0.8, 0), label: new THREE.Vector3(2.0, 0.4, 0), text: 'Right Atrium' },
        { point: new THREE.Vector3(-0.3, 0, 0), label: new THREE.Vector3(-1.7, -0.6, 0), text: 'Left Ventricle' },
        { point: new THREE.Vector3(0.3, 0, 0), label: new THREE.Vector3(1.7, -0.6, 0), text: 'Right Ventricle' },
        { point: new THREE.Vector3(-0.5, 2.3, 0), label: new THREE.Vector3(-2.0, 2.6, 0), text: 'Carotid Artery' },
        { point: new THREE.Vector3(0.6, 1.4, 0), label: new THREE.Vector3(2.2, 1.2, 0), text: 'Jugular Vein', color: '#66ccff' }
      ];

      heartLabels.forEach((entry) => {
        const sprite = createLabelSprite(entry.text, entry.color || '#ffffff');
        sprite.position.copy(entry.label);
        heartGroup.add(sprite);

        const leader = createLeaderLine(entry.point, entry.label);
        heartGroup.add(leader);
      });
    }

    addHeartLabels(anatomicalHeart);

    // Animation loop
    function animate() {
      requestAnimationFrame(animate);

      const time = Date.now() * 0.001;

      // Update smooth rotations
      updateRotation();

      // Animate blood flow particles
      bloodFlowParticles.children.forEach((particle, index) => {
        const speed = particle.userData.speed;
        const phase = particle.userData.phase;

        // Use flowSettings.speed for state-controlled dynamics
        const dynamicSpeed = flowSettings.speed;

        // Create flowing motion along circulatory paths
        particle.position.y += Math.sin(time * speed + phase) * (0.01 * (dynamicSpeed / 2.0));
        particle.position.x += Math.cos(time * speed * 0.5 + phase) * (0.005 * (dynamicSpeed / 2.0));

        // Reset particles that go too far
        if (particle.position.y > 4) {
          particle.position.y = -4;
          particle.position.x = (Math.random() - 0.5) * 4;
        }

        // Pulsing glow effect
        particle.material.opacity = 0.6 + Math.sin(time * 2 + phase) * 0.3;
      });

      // Gentle heart beat animation - responsive to state machine
      const heartPulseRate = heart.userData.pulseRate || 2.0;
      const heartPulseScale = heart.userData.pulseScale || 1.02;
      const scale = 1 + Math.sin(time * heartPulseRate) * (heartPulseScale - 1);
      anatomicalHeart.scale.setScalar(scale);

      // Subtle camera movement for cinematic effect
      camera.position.x = Math.sin(time * 0.1) * 0.5;
      camera.position.y = 2 + Math.sin(time * 0.15) * 0.3;
      camera.lookAt(0, 0, 0);

      renderer.render(scene, camera);
    }

    console.log('Scene objects:', scene.children.length);
    console.log('Camera position:', camera.position);
    console.log('Renderer created:', !!renderer.domElement);

    // Handle window resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Enhanced mouse controls for medical visualization
    let isMouseDown = false;
    let mouseX = 0;
    let mouseY = 0;
    let targetRotationX = 0;
    let targetRotationY = 0;
    let currentRotationX = 0;
    let currentRotationY = 0;

    document.addEventListener('mousedown', (event) => {
      isMouseDown = true;
      mouseX = event.clientX;
      mouseY = event.clientY;
    });

    document.addEventListener('mouseup', () => {
      isMouseDown = false;
    });

    document.addEventListener('mousemove', (event) => {
      if (isMouseDown) {
        const deltaX = event.clientX - mouseX;
        const deltaY = event.clientY - mouseY;

        targetRotationY += deltaX * 0.005;
        targetRotationX += deltaY * 0.005;

        targetRotationX = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, targetRotationX));

        mouseX = event.clientX;
        mouseY = event.clientY;
      }
    });

    // Smooth rotation interpolation
    function updateRotation() {
      currentRotationX += (targetRotationX - currentRotationX) * 0.1;
      currentRotationY += (targetRotationY - currentRotationY) * 0.1;

      anatomicalHeart.rotation.y = currentRotationY;
      anatomicalHeart.rotation.x = currentRotationX;
      circulatorySystem.rotation.y = currentRotationY;
      circulatorySystem.rotation.x = currentRotationX;
    }

    // Zoom with mouse wheel
    document.addEventListener('wheel', (event) => {
      camera.position.z += event.deltaY * 0.01;
      camera.position.z = Math.max(3, Math.min(15, camera.position.z));
    });

    // Start the animation loop
    animate();
  </script>
