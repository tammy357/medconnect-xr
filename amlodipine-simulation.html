<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Amlodipine Mechanism Simulation</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #081123;
      color: #e2e8f0;
      overflow: hidden;
      min-height: 100vh;
    }
    canvas { display: block; }
    .info-panel {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 340px;
      background: rgba(6, 18, 44, 0.92);
      border: 1px solid rgba(46, 161, 255, 0.25);
      border-radius: 16px;
      padding: 24px;
      z-index: 1000;
      backdrop-filter: blur(10px);
    }
    .info-panel h2 {
      font-size: 1.4rem;
      color: #2ea1ff;
      margin-bottom: 14px;
    }
    .info-panel p {
      font-size: 0.95rem;
      line-height: 1.7;
      color: #cbd5e1;
      margin-bottom: 18px;
    }
    .metric {
      margin-bottom: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(46, 161, 255, 0.06);
      border: 1px solid rgba(46, 161, 255, 0.14);
    }
    .metric-label {
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #94a3b8;
      margin-bottom: 4px;
    }
    .metric-value {
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
    }
    .control-panel {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 1000;
      background: rgba(6, 18, 44, 0.95);
      border: 1px solid rgba(46, 161, 255, 0.18);
      border-radius: 16px;
      padding: 18px;
      backdrop-filter: blur(12px);
    }
    button, .nav-link {
      background: linear-gradient(135deg, #2ea1ff, #06b6d4);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    button:hover:not(:disabled), .nav-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 32px rgba(46, 161, 255, 0.18);
    }
    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .back-button {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
      background: rgba(15, 23, 42, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 14px;
      color: #e2e8f0;
      padding: 10px 16px;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <a href="circulatory-system.html" class="back-button">← Back to Heart View</a>
  <div class="info-panel">
    <h2>Amlodipine Mechanism</h2>
    <p>Amlodipine blocks vascular smooth muscle calcium channels, causing arterial smooth muscle relaxation and vasodilation. This lowers resistance and improves blood flow.</p>
    <div class="metric">
      <div class="metric-label">Current State</div>
      <div class="metric-value"><span id="stateText">Ready</span></div>
    </div>
    <div class="metric">
      <div class="metric-label">Vessel Diameter</div>
      <div class="metric-value" id="diameterValue">1.00 mm</div>
    </div>
    <div class="metric">
      <div class="metric-label">Flow Velocity</div>
      <div class="metric-value" id="velocityValue">100%</div>
    </div>
    <div class="metric">
      <div class="metric-label">Pressure</div>
      <div class="metric-value" id="pressureValue">100 mmHg</div>
    </div>
  </div>

  <div class="control-panel">
    <button id="baselineBtn" onclick="showBaseline()">Baseline</button>
    <button id="drugBtn" onclick="administerDrug()">Administer</button>
    <button id="effectBtn" onclick="showEffect()">Show Effect</button>
    <button id="resetBtn" onclick="resetSimulation()">Reset</button>
  </div>

  <script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x081123);
    scene.fog = new THREE.Fog(0x081123, 8, 25);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.2, 4);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.35);
    scene.add(ambientLight);

    const keyLight = new THREE.DirectionalLight(0xffffff, 0.9);
    keyLight.position.set(4, 6, 4);
    scene.add(keyLight);

    const rimLight = new THREE.DirectionalLight(0x2ea1ff, 0.45);
    rimLight.position.set(-4, 2, -3);
    scene.add(rimLight);

    const vesselGroup = new THREE.Group();
    scene.add(vesselGroup);

    const config = {
      baseline: { radius: 0.5, color: 0xff3b3b, velocity: 1.0, pressure: 100, label: 'Baseline' },
      medicated: { radius: 0.78, color: 0x2ea1ff, velocity: 0.65, pressure: 75, label: 'Medicated' }
    };

    let vesselRadius = config.baseline.radius;
    let flowVelocity = config.baseline.velocity;
    let bloodPressure = config.baseline.pressure;
    let simulationState = 'READY';
    let flowParticles = [];
    let vesselMesh;

    function createVessel(radius, color) {
      const path = new THREE.LineCurve3(new THREE.Vector3(-2.4, 0, 0), new THREE.Vector3(2.4, 0, 0));
      const geometry = new THREE.TubeGeometry(path, 40, radius, 14, false);
      const material = new THREE.MeshLambertMaterial({
        color,
        transparent: true,
        opacity: 0.88,
        emissive: color,
        emissiveIntensity: 0.15
      });
      const mesh = new THREE.Mesh(geometry, material);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      return mesh;
    }

    function createFlowParticles(count) {
      flowParticles = [];
      const group = new THREE.Group();
      for (let i = 0; i < count; i++) {
        const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.06, 10, 10), new THREE.MeshBasicMaterial({ color: 0xffcad4, transparent: true, opacity: 0.85 }));
        sphere.position.set(-2.4 + (i / count) * 4.8, (Math.random() - 0.5) * 0.1, (Math.random() - 0.5) * 0.1);
        sphere.userData.offset = Math.random() * Math.PI * 2;
        group.add(sphere);
        flowParticles.push(sphere);
      }
      return group;
    }

    const channelGroup = new THREE.Group();
    vesselGroup.add(channelGroup);

    function createCalciumChannels(radius) {
      channelGroup.clear();
      const count = 10;
      for (let i = 0; i < count; i++) {
        const angle = (i / count) * Math.PI * 2;
        const x = -1.8 + (i / count) * 3.6;
        const y = Math.cos(angle) * radius * 1.3;
        const z = Math.sin(angle) * radius * 1.3;
        const channel = new THREE.Mesh(new THREE.SphereGeometry(0.06, 10, 10), new THREE.MeshBasicMaterial({ color: 0xffff66, emissive: 0xffff66 }));
        channel.position.set(x, y, z);
        channel.userData.blocked = false;
        channelGroup.add(channel);
      }
    }

    function buildScene() {
      vesselGroup.clear();
      vesselMesh = createVessel(vesselRadius, config.baseline.color);
      vesselGroup.add(vesselMesh);
      const particles = createFlowParticles(12);
      vesselGroup.add(particles);
      vesselGroup.add(channelGroup);
      createCalciumChannels(vesselRadius);
    }

    function updateMetrics() {
      document.getElementById('diameterValue').textContent = (vesselRadius * 2).toFixed(2) + ' mm';
      document.getElementById('velocityValue').textContent = Math.round(flowVelocity * 100) + '%';
      document.getElementById('pressureValue').textContent = bloodPressure + ' mmHg';
    }

    function setState(state) {
      simulationState = state;
      document.getElementById('stateText').textContent = config[state.toLowerCase()] ? config[state.toLowerCase()].label : 'Ready';
    }

    function setButtons(enabled) {
      document.getElementById('baselineBtn').disabled = !enabled;
      document.getElementById('drugBtn').disabled = !enabled;
      document.getElementById('effectBtn').disabled = !enabled;
      document.getElementById('resetBtn').disabled = !enabled;
    }

    function showBaseline() {
      setState('BASELINE');
      setButtons(false);
      gsap.to(vesselMesh.scale, { duration: 1.6, x: 1, y: 1, z: 1, ease: 'power2.out' });
      gsap.to(window, {
        duration: 1.6,
        onUpdate() {
          vesselMesh.material.color.setHex(config.baseline.color);
        }
      });
      gsap.to({ r: vesselRadius, v: flowVelocity, p: bloodPressure }, {
        duration: 1.6,
        r: config.baseline.radius,
        v: config.baseline.velocity,
        p: config.baseline.pressure,
        ease: 'power2.out',
        onUpdate() {
          vesselRadius = this.targets(0).r;
          flowVelocity = this.targets(0).v;
          bloodPressure = this.targets(0).p;
          updateMetrics();
          recreateVessel(config.baseline.color);
        },
        onComplete() { setButtons(true); }
      });
    }

    function administerDrug() {
      setState('MEDICATED');
      setButtons(false);
      const duration = 2.2;
      channelGroup.children.forEach((channel, index) => {
        gsap.to(channel.material, { duration: 0.6, delay: index * 0.08, opacity: 0.25, ease: 'power1.out' });
      });
      gsap.to({ r: vesselRadius, v: flowVelocity, p: bloodPressure }, {
        duration,
        r: config.medicated.radius,
        v: config.medicated.velocity,
        p: config.medicated.pressure,
        ease: 'power2.out',
        onUpdate() {
          vesselRadius = this.targets(0).r;
          flowVelocity = this.targets(0).v;
          bloodPressure = this.targets(0).p;
          updateMetrics();
          recreateVessel(config.medicated.color);
        },
        onComplete() { setButtons(true); }
      });
    }

    function showEffect() {
      setState('MEDICATED');
      setButtons(false);
      const timeline = gsap.timeline({ onComplete: () => setButtons(true) });
      timeline.to(vesselMesh.material.color, { duration: 1.6, r: 0.18, g: 0.63, b: 1.0, ease: 'power2.out' }, 0);
      timeline.to({ r: vesselRadius, v: flowVelocity, p: bloodPressure }, {
        duration: 1.6,
        r: config.medicated.radius,
        v: config.medicated.velocity,
        p: config.medicated.pressure,
        ease: 'power2.out',
        onUpdate() {
          vesselRadius = this.targets(0).r;
          flowVelocity = this.targets(0).v;
          bloodPressure = this.targets(0).p;
          updateMetrics();
          recreateVessel(config.medicated.color);
        }
      }, 0);
      timeline.to(channelGroup.children, { duration: 0.8, opacity: 0.22, stagger: 0.08 }, 0);
    }

    function resetSimulation() {
      setState('READY');
      setButtons(true);
      vesselRadius = config.baseline.radius;
      flowVelocity = config.baseline.velocity;
      bloodPressure = config.baseline.pressure;
      recreateVessel(config.baseline.color);
      channelGroup.children.forEach(channel => channel.material.opacity = 1);
      updateMetrics();
    }

    function recreateVessel(color) {
      vesselGroup.remove(vesselMesh);
      vesselMesh.geometry.dispose();
      vesselMesh.material.dispose();
      vesselMesh = createVessel(vesselRadius, color);
      vesselGroup.add(vesselMesh);
      vesselGroup.children.forEach(child => { if (child.type === 'Group' && child !== channelGroup) vesselGroup.remove(child); });
      const flow = createFlowParticles(12);
      vesselGroup.add(flow);
      vesselGroup.add(channelGroup);
    }

    buildScene();
    updateMetrics();
    setButtons(true);

    let time = 0;
    function animate() {
      requestAnimationFrame(animate);
      time += 0.016;
      vesselGroup.rotation.y = Math.sin(time * 0.15) * 0.12;
      vesselGroup.rotation.x = Math.sin(time * 0.07) * 0.06;
      vesselGroup.children.forEach(child => {
        if (child.type === 'Group' && child !== channelGroup) {
          child.children.forEach(p => {
            if (p.userData.offset !== undefined) {
              const phase = p.userData.offset + time * flowVelocity * 2;
              p.position.x = -2.4 + ((phase % (Math.PI * 2)) / (Math.PI * 2)) * 4.8;
            }
          });
        }
      });
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
